plugins {
    id 'java'
    id 'application'
}

group = 'it.unicam.cs.mpgc'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Libreria per i Test Unitari (JUnit 5)
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'

    // Libreria per la persistenza JSON (Google Gson)
    implementation 'com.google.code.gson:gson:2.10.1'
}

application {
    // Dice a Gradle di avviare il gioco dalla classe MainApp
    mainClass = 'it.unicam.cs.mpgc.rpg126322.MainApp'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 25
}

test {
    useJUnitPlatform()
}
